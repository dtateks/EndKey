name: EndKey Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  BUILD_TYPE: Debug
  BUILD_DIR: ${{ github.workspace }}/build

jobs:
  build-and-test:
    runs-on: macos-latest

    strategy:
      matrix:
        include:
          - name: "macOS Intel"
            arch: x86_64
          - name: "macOS Apple Silicon"
            arch: arm64

    name: ${{ matrix.name }} Tests

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install dependencies
      run: |
        # Install GoogleTest framework
        if [ ! -d "/usr/local/include/gtest" ]; then
          brew install googletest
        fi

        # Install CMake if not present
        if ! command -v cmake &> /dev/null; then
          brew install cmake
        fi

    - name: Cache build artifacts
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.BUILD_DIR }}
          ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Configure CMake
      run: |
        mkdir -p ${{ env.BUILD_DIR }}
        cd ${{ env.BUILD_DIR }}
        cmake ${{ github.workspace }}/tests \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DENABLE_COVERAGE=ON \
          -DCMAKE_PREFIX_PATH=/usr/local

    - name: Build tests
      run: |
        cd ${{ env.BUILD_DIR }}
        make -j$(sysctl -n hw.ncpu) EndKeyTests

    - name: Run Vietnamese Input Tests
      run: |
        cd ${{ env.BUILD_DIR }}
        ./EndKeyTests --gtest_filter="VietnameseInputTest.*" --gtest_output=xml:vietnamese_test_results.xml

    - name: Run Performance Tests
      run: |
        cd ${{ env.BUILD_DIR }}
        ./EndKeyTests --gtest_filter="PerformanceTest.*" --gtest_output=xml:performance_test_results.xml

    - name: Run Integration Tests
      run: |
        cd ${{ env.BUILD_DIR }}
        ./EndKeyTests --gtest_filter="IntegrationTest.*" --gtest_output=xml:integration_test_results.xml

    - name: Run Regression Tests
      run: |
        cd ${{ env.BUILD_DIR }}
        ./EndKeyTests --gtest_filter="RegressionTest.*" --gtest_output=xml:regression_test_results.xml

    - name: Run Macro Tests
      run: |
        cd ${{ env.BUILD_DIR }}
        ./EndKeyTests --gtest_filter="MacroTest.*" --gtest_output=xml:macro_test_results.xml

    - name: Run Code Table Tests
      run: |
        cd ${{ env.BUILD_DIR }}
        ./EndKeyTests --gtest_filter="CodeTableTest.*" --gtest_output=xml:code_table_test_results.xml

    - name: Run Full Test Suite
      run: |
        cd ${{ env.BUILD_DIR }}
        ./EndKeyTests --gtest_output=xml:full_test_results.xml

    - name: Generate Coverage Report
      run: |
        cd ${{ env.BUILD_DIR }}
        if command -v gcov &> /dev/null; then
          gcov $(find . -name "*.gcno")
          lcov --capture --directory . --output-file coverage.info
          genhtml coverage.info --output-directory coverage_report
        fi

    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.arch }}
        path: |
          ${{ env.BUILD_DIR }}/*_test_results.xml
          ${{ env.BUILD_DIR }}/coverage_report/
        retention-days: 30

    - name: Performance Regression Detection
      run: |
        cd ${{ env.BUILD_DIR }}
        python3 ${{ github.workspace }}/scripts/check_performance_regression.py performance_test_results.xml

    - name: Vietnamese Input Accuracy Check
      run: |
        cd ${{ env.BUILD_DIR }}
        python3 ${{ github.workspace }}/scripts/validate_vietnamese_input.py vietnamese_test_results.xml

  security-scan:
    runs-on: macos-latest
    name: Security Scanning

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: cpp

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

    - name: Run Static Analysis
      run: |
        # Install clang-tidy if not present
        if ! command -v clang-tidy &> /dev/null; then
          brew install llvm
        fi

        # Run static analysis on C++ files
        find Sources/EndKey/engine -name "*.cpp" -o -name "*.h" | \
          xargs clang-tidy --checks='*,-modernize-use-trailing-return-type' \
          -p ${{ github.workspace }}/build 2>/dev/null || true

  memory-leak-detection:
    runs-on: macos-latest
    name: Memory Leak Detection

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Valgrind (alternative for macOS)
      run: |
        # macOS doesn't have Valgrind, use leaks tool instead
        brew install valgrind 2>/dev/null || echo "Valgrind not available on macOS"

    - name: Build with Debug Symbols
      run: |
        mkdir -p build
        cd build
        cmake ../tests -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON
        make -j$(sysctl -n hw.ncpu) EndKeyTests

    - name: Run Memory Leak Tests
      run: |
        cd build
        if command -v valgrind &> /dev/null; then
          valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes \
            --suppressions=${{ github.workspace }}/tests/valgrind.supp \
            ./EndKeyTests --gtest_filter="*Memory*" --gtest_output=xml:memory_test_results.xml
        else
          # Use macOS leaks tool
          MallocStackLogging=1 ./EndKeyTests --gtest_filter="*Memory*" &
          pid=$!
          sleep 5
          leaks $pid > leaks_output.txt
          kill $pid 2>/dev/null || true
        fi

  build-validation:
    runs-on: macos-latest
    name: Build Validation

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Clean Build
      run: |
        killall -9 EndKey EndKeyHelper 2>/dev/null || true
        rm -rf Sources/EndKey/macOS/build/

    - name: Build EndKey App
      run: |
        xcodebuild -project Sources/EndKey/macOS/EndKey.xcodeproj \
          -target EndKey \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          clean build

    - name: Validate App Bundle
      run: |
        if [ -d "Sources/EndKey/macOS/build/Debug/EndKey.app" ]; then
          echo "✅ App bundle created successfully"

          # Check app structure
          if [ -f "Sources/EndKey/macOS/build/Debug/EndKey.app/Contents/MacOS/EndKey" ]; then
            echo "✅ Main executable found"
          else
            echo "❌ Main executable missing"
            exit 1
          fi

          # Check Info.plist
          if [ -f "Sources/EndKey/macOS/build/Debug/EndKey.app/Contents/Info.plist" ]; then
            echo "✅ Info.plist found"
          else
            echo "❌ Info.plist missing"
            exit 1
          fi
        else
          echo "❌ App bundle not created"
          exit 1
        fi

  test-reporting:
    runs-on: macos-latest
    name: Test Reporting
    needs: [build-and-test, security-scan, memory-leak-detection]
    if: always()

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Test Artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/

    - name: Generate Comprehensive Report
      run: |
        python3 scripts/generate_test_report.py \
          --input-dir artifacts/ \
          --output-dir test-report/ \
          --format html,json \
          --title "EndKey Test Suite Report"

    - name: Upload Test Report
      uses: actions/upload-artifact@v3
      with:
        name: comprehensive-test-report
        path: test-report/
        retention-days: 90

    - name: Comment PR with Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          // Read test report summary
          const reportPath = 'test-report/summary.json';
          if (fs.existsSync(reportPath)) {
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

            const comment = `
            ## 🧪 Test Results for EndKey

            ### 📊 Test Summary
            - **Total Tests**: ${report.total_tests}
            - **Passed**: ${report.passed_tests} ✅
            - **Failed**: ${report.failed_tests} ❌
            - **Skipped**: ${report.skipped_tests} ⏭️
            - **Coverage**: ${report.coverage_percentage}%

            ### ⚡ Performance Metrics
            - **Average Latency**: ${report.avg_latency}μs
            - **Memory Usage**: ${report.memory_usage}MB

            ### 🔍 Security Scan
            - **Vulnerabilities Found**: ${report.security_vulnerabilities}
            - **Critical**: ${report.critical_vulnerabilities} 🔴
            - **High**: ${report.high_vulnerabilities} 🟡

            [View Detailed Report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }